services:
  db:
    image: postgres:16
    container_name: tcc_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adoptme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d adoptme"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: tcc_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adoptme
      SECRET_KEY: secret123
      FLASK_SECRET_KEY: secret123
      JWT_SECRET_KEY: jwt123
      JWT_SECRET: jwt123
      FRONT_HOME: http://18.226.20.196:5173
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://18.226.20.196:5000/api/auth/google/callback}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://18.226.20.196:5000/api
    container_name: tcc_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
